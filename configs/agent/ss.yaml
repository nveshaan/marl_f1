train_env:
  _target_: agents.common.build_env
  env_cfg:
    _target_: stable_baselines3.common.env_util.make_vec_env
    env_id: ${env_id}
    n_envs: 4
    seed: ${seed}
    vec_env_cls:
      _target_: stable_baselines3.common.vec_env.DummyVecEnv
      _partial_: true
    # Override env_kwargs to use single agent and discrete actions for gym environment
    env_kwargs:
      num_agents: 1
      continuous: false
    monitor_dir: ${run_dir}/${paths.monitor_train}
  wrappers:
    - _target_: stable_baselines3.common.vec_env.VecMonitor
    - _target_: stable_baselines3.common.vec_env.VecNormalize
      norm_obs: true
      norm_reward: true
      clip_reward: 10.0

eval_env:
  _target_: agents.common.build_env
  env_cfg:
    _target_: stable_baselines3.common.env_util.make_vec_env
    env_id: ${env_id}
    n_envs: 1
    seed: ${eval:'${seed} + 1000'}
    vec_env_cls:
      _target_: stable_baselines3.common.vec_env.DummyVecEnv
      _partial_: true
    # Override env_kwargs to use single agent and discrete actions for gym environment
    env_kwargs:
      num_agents: 1
      continuous: false
    monitor_dir: ${run_dir}/${paths.monitor_eval}
  wrappers:
    - _target_: stable_baselines3.common.vec_env.VecMonitor
    - _target_: stable_baselines3.common.vec_env.VecNormalize
      norm_obs: true
      norm_reward: false
      training: false

# Use MlpPolicy instead of CnnPolicy to avoid image format issues
policy:
  name: mlp
  policy: MlpPolicy
  policy_kwargs: {}

train:
  total_timesteps: ${algo.train.total_timesteps}
  tb_log_name: ${experiment_name}
  progress_bar: true
