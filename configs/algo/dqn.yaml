name: dqn
family: model_free
model:
  _target_: stable_baselines3.DQN
  seed: ${seed}
  device: ${device}
  policy: ${policy.policy}
  policy_kwargs: ${policy.policy_kwargs}
  learning_rate: 1e-4
  buffer_size: 100000
  batch_size: 32
  verbose: 1
  tensorboard_log: ${run_dir}/${paths.tb}
train:
  total_timesteps: 1000000
agent:
  _target_: agents.baseline.SingleAgent
env_kwargs:
  seed: ${seed}
  num_agents: 1
  continuous: false