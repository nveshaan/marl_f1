defaults:
  - _self_
  - agent: sb3
  - algo: dqn
  - policy: cnn
  - task: single

seed: 42
project: marl_f1
experiment_name: ${task.name}_${algo.name}_${policy.name}_seed${seed}
timestamp: ${now:%Y%m%d_%H%M%S}
device: ${device:}
num_threads: 8
env_id: MultiCarRacing-v2

run_dir: ${hydra:runtime.output_dir}
paths:
  tb: tb
  checkpoints: checkpoints
  monitor_train: monitor_train
  monitor_eval: monitor_eval
  best_model: best_model
  eval_logs: eval_logs
  viz: viz

hydra:
  run:
    dir: experiments/${experiment_name}_${next_index:${experiment_name},experiments}
  sweep:
    dir: experiments/
    subdir: ${experiment_name}_${next_index:${experiment_name},experiments}
  job:
    chdir: false
