defaults:
  - algo: dqn
  - policy: cnn
  - wrappers: image_stack
  - _self_

task: single
seed: 42
project: marl_f1
experiment_name: ${task}_${algo.name}_${policy.name}_seed${seed}
device: ${device:}
num_threads: 8
env_id: MultiCarRacing-v1

paths:
  tb: tb
  checkpoints: checkpoints
  monitor_train: monitor_train
  monitor_eval: monitor_eval
  best_model: best_model
  eval_logs: eval_logs

train_env:
  _target_: stable_baselines3.common.env_util.make_vec_env
  env_id: ${env_id}
  n_envs: 4
  seed: ${seed}
  vec_env_cls:
    _target_: hydra.utils.get_class
    path: stable_baselines3.common.vec_env.DummyVecEnv
  env_kwargs: ${algo.env_kwargs}
  monitor_dir: ${hydra:runtime.output_dir}/${paths.monitor_train}

eval_env:
  _target_: utils.sb3.build_env
  env_cfg:
    _target_: stable_baselines3.common.env_util.make_vec_env
    env_id: ${env_id}
    n_envs: 1
    seed: ${eval:'${seed} + 1000'}
    vec_env_cls:
      _target_: hydra.utils.get_class
      path: stable_baselines3.common.vec_env.DummyVecEnv
    env_kwargs: ${algo.env_kwargs}
    monitor_dir: ${hydra:runtime.output_dir}/${paths.monitor_eval}
  wrappers: ${wrappers.eval.wrappers}

train:
  total_timesteps: ${algo.train.total_timesteps}
  tb_log_name: ${experiment_name}
  progress_bar: true

hydra:
  run:
    dir: experiments/${experiment_name}_${now:%Y%m%d_%H%M%S}
  sweep:
    dir: experiments/multirun
    subdir: ${experiment_name}_${hydra.job.num}
  job:
    chdir: false
